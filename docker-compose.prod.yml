version: '3.8'

services:
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}-backend:latest
    ports:
      - "3001:3001"
    restart: unless-stopped

networks:
  default:
    name: ai-parliament-network
